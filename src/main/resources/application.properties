server.port=8080


# Conexion a PostgreSQL (ajusta usuario/contrasena/puerto a tu instalacion local)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=huevolas12.
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: 'update' crea/actualiza tablas automaticamente en desarrollo.
# Cambia a 'validate' o usa migraciones (Flyway/Liquibase) antes de produccion.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect